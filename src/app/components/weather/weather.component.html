<div class="weather-kiosk">
    <div class="row weatherRow no-gutters align-items-stretch">
        <div class="col-3 weather-col-thermostat">
            <app-thermostat></app-thermostat>
        </div>

        <div class="col-6 weather-col-main">
            <section class="weather-hero" aria-label="Current weather">
                <div class="weather-hero-panel">
                    <div id="currentTemp" class="current-temp">{{ currentTemp }}&deg;</div>
                    <div class="currentConditions">{{ currentConditions }}</div>
                </div>
            </section>

            <section class="ac-controls" aria-label="HVAC controls">
                <div class="ac-controls-row">
                    <button
                        type="button"
                        class="btn btn-outline-primary btn-lg hvac-btn hvac-btn--cool"
                        [ngClass]="{ active: isActive('cool') }"
                        (click)="setActive('cool')">
                        <i class="fas fa-snowflake hvac-btn-icon" aria-hidden="true"></i>
                        <span class="hvac-btn-label">Cool</span>
                    </button>
                    <button
                        type="button"
                        class="btn btn-outline-danger btn-lg hvac-btn hvac-btn--heat"
                        [ngClass]="{ active: isActive('heat') }"
                        (click)="setActive('heat')">
                        <i class="fas fa-fire hvac-btn-icon" aria-hidden="true"></i>
                        <span class="hvac-btn-label">Heat</span>
                    </button>
                    <button
                        type="button"
                        class="btn btn-outline-light btn-lg hvac-btn hvac-btn--fan"
                        [ngClass]="{ active: isActive('fan') }"
                        (click)="setFanActive()">
                        <i
                            class="fas fa-fan hvac-btn-icon fan-icon"
                            [ngClass]="{ spin: isActive('fan') }"
                            aria-hidden="true"></i>
                        <span class="hvac-btn-label">Fan</span>
                    </button>
                </div>
            </section>
        </div>

        <div class="col-3 fiveDayForecast">
            <h2 class="forecast-heading">Forecast</h2>
            <div class="fiveDayList">
                <div *ngFor="let day of forecastArray" class="forecast-day">
                    <span class="forecast-period">{{ day.period }}</span>
                    <span class="forecast-temps fiveDayTemp">
                        <span class="forecast-high"><strong>{{ day.maxTemp }}</strong>&deg;</span>
                        <span class="forecast-sep">/</span>
                        <span class="forecast-low"><strong>{{ day.minTemp }}</strong>&deg;</span>
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>
